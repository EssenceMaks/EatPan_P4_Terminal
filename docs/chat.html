<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EatPan — Global P2P Chat</title>
  <meta name="description" content="EatPan decentralized P2P chat via libp2p in the browser">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0e17;
      --bg-card: #111827;
      --bg-input: #1e293b;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.4);
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f59e0b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --border: #1e293b;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #111827 0%, #1a1f3a 100%);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.connecting { background: var(--orange); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Connection Panel ── */
    .conn-panel {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .conn-panel label { color: var(--text-dim); }
    .conn-panel input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
      font-family: 'Inter', monospace;
      flex: 1;
      min-width: 200px;
    }
    .conn-panel button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .conn-panel button:hover { background: #4f46e5; transform: translateY(-1px); }
    .conn-panel button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.own {
      align-self: flex-end;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.other {
      align-self: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg .meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.own .meta { color: rgba(255,255,255,0.7); }
    .msg .route-tag {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-dim);
      font-size: 11px;
      max-width: 90%;
      text-align: center;
    }

    /* ── Input area ── */
    .input-area {
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    #msg-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    #send-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    #send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent-glow); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Footer ── */
    footer {
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 6px 20px;
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Log Panel ── */
    #log-panel {
      max-height: 120px;
      overflow-y: auto;
      background: #080c14;
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 10px;
      font-family: monospace;
      color: var(--text-dim);
      flex-shrink: 0;
      display: none;
    }
    #log-panel.visible { display: block; }
    .log-entry { margin: 1px 0; }
    .log-entry.error { color: var(--red); }
    .log-entry.success { color: var(--green); }
    .log-entry.info { color: var(--orange); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>🌐 EatPan Global Chat</h1>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Disconnected</span>
    <span style="color: var(--text-dim)">|</span>
    <span id="peer-count">0 peers</span>
    <button onclick="toggleLog()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer">Log</button>
  </div>
</header>

<div class="conn-panel">
  <label>Name:</label>
  <input id="name-input" value="" placeholder="Your name..." style="max-width:140px;flex:none">
  <label>Peer Addrs (WS):</label>
  <input id="peer-addrs" placeholder="Comma-separated /dns4/.../ws/p2p/... addresses">
  <button id="connect-btn" onclick="startChat()">Connect</button>
</div>

<div id="chat-area">
  <div class="msg system">Welcome to EatPan Global Chat. Enter your name and click Connect to join the P2P mesh.</div>
</div>

<div class="input-area">
  <input id="msg-input" placeholder="Type a message..." disabled>
  <button id="send-btn" disabled onclick="sendMessage()">Send</button>
</div>

<div id="log-panel"></div>

<footer>
  <span id="my-peer-id">Peer ID: —</span>
  <span>EatPan P2P Chat v1.0 | WebSocket → GossipSub</span>
</footer>

<!-- libp2p local bundle (built by web-chat/build.mjs) -->
<script type="module">
  // ── Local bundle import (replaces broken CDN) ──
  import { createLibp2p, webSockets, wsAllFilter, noise, yamux, gossipsub, identify, ping, bootstrap, circuitRelayTransport, multiaddr } from './chat-bundle.js'

  // ── Config ──
  const TOPIC = 'eatpan-chat'
  const AWS_BOOTSTRAP_WS = '/dns4/relay.eatpan.com/tcp/443/wss/p2p/12D3KooWQRJdQ4zUHDtdUZRRcMG8ZFkZDrL8VFHRyUf29SdEKtut'

  let node = null
  let myPeerId = ''
  let myName = ''
  let sentIds = new Set()
  let connectedPeers = new Set()

  // ── UI helpers ──
  const $ = id => document.getElementById(id)
  const chatArea = $('chat-area')
  const logPanel = $('log-panel')

  function addLog(msg, cls = '') {
    const d = document.createElement('div')
    d.className = 'log-entry ' + cls
    d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
    logPanel.appendChild(d)
    logPanel.scrollTop = logPanel.scrollHeight
  }

  function addMessage(data, own = false) {
    const div = document.createElement('div')
    div.className = 'msg ' + (own ? 'own' : 'other')
    const meta = document.createElement('div')
    meta.className = 'meta'
    meta.innerHTML = `<span>${data.name || 'Anon'}</span>${data.route ? `<span class="route-tag">${data.route}</span>` : ''}`
    const text = document.createElement('div')
    text.textContent = data.text
    div.appendChild(meta)
    div.appendChild(text)
    chatArea.appendChild(div)
    chatArea.scrollTop = chatArea.scrollHeight
  }

  function addSystem(text) {
    const div = document.createElement('div')
    div.className = 'msg system'
    div.textContent = text
    chatArea.appendChild(div)
    chatArea.scrollTop = chatArea.scrollHeight
  }

  function updateStatus(state, text) {
    const dot = $('status-dot')
    dot.className = 'status-dot ' + state
    $('status-text').textContent = text
  }

  function updatePeerCount() {
    $('peer-count').textContent = connectedPeers.size + ' peer' + (connectedPeers.size !== 1 ? 's' : '')
  }

  window.toggleLog = () => { logPanel.classList.toggle('visible') }

  // ── Generate random name ──
  $('name-input').value = 'Web-' + Math.random().toString(36).substring(2, 6)

  // ── Start chat ──
  window.startChat = async function() {
    const connectBtn = $('connect-btn')
    connectBtn.disabled = true
    updateStatus('connecting', 'Connecting...')
    addLog('Starting libp2p node...', 'info')

    myName = $('name-input').value || 'WebUser'

    try {
      // Build bootstrap list: user addrs first, then AWS fallback
      const userAddrs = $('peer-addrs').value
        .split(',')
        .map(s => s.trim())
        .filter(s => s.length > 10)

      const bootstrapList = [...userAddrs, AWS_BOOTSTRAP_WS]
      addLog(`Bootstrap chain: ${bootstrapList.length} addr(s) — user: ${userAddrs.length}, AWS fallback: 1`)

      node = await createLibp2p({
        addresses: {
          listen: ['/p2p-circuit']     // listen via relay so Electron peers can reach us
        },
        transports: [
          webSockets({ filter: wsAllFilter }),
          circuitRelayTransport({ discoverRelays: 1 })   // connect through AWS relay
        ],
        connectionEncrypters: [noise()],
        streamMuxers: [yamux()],
        connectionManager: {
          minConnections: 2,
          maxConnections: 50,
        },
        peerDiscovery: [
          bootstrap({ list: bootstrapList })
        ],
        services: {
          identify: identify(),
          ping: ping(),
          pubsub: gossipsub({
            emitSelf: false,
            allowPublishToZeroTopicPeers: true,
            floodPublish: true,
            heartbeatInterval: 1000,
          })
        }
      })

      myPeerId = node.peerId.toString()
      $('my-peer-id').textContent = 'Peer ID: ' + myPeerId.substring(0, 16) + '...'
      addLog('Node started: ' + myPeerId.substring(0, 20) + '...', 'success')

      // Subscribe to chat topic
      node.services.pubsub.subscribe(TOPIC)

      // ── Events ──
      let firstConnection = true
      let lastConnectMsgTime = 0

      node.addEventListener('peer:discovery', (evt) => {
        const id = evt.detail.id.toString()
        addLog('Discovered: ' + id.substring(0, 16) + '...')
        node.dial(evt.detail.id).catch(err => {
          addLog('Dial fail: ' + err.message.substring(0, 50), 'error')
        })
      })

      node.addEventListener('peer:connect', (evt) => {
        const id = evt.detail.toString()
        connectedPeers.add(id)
        updatePeerCount()
        updateStatus('connected', 'Connected')
        addLog('+ Connected: ' + id.substring(0, 16) + '...', 'success')

        // Only show system message for first connection (avoid spam)
        const now = Date.now()
        if (firstConnection || now - lastConnectMsgTime > 30000) {
          addSystem('🔗 Connected to peer ' + id.substring(0, 12) + '...')
          firstConnection = false
          lastConnectMsgTime = now
        }

        // Tag peer to prevent pruning
        node.peerStore.merge(evt.detail, {
          tags: { 'keep-alive': { value: 100, ttl: 600000 } }
        }).catch(() => {})
      })

      node.addEventListener('peer:disconnect', (evt) => {
        const id = evt.detail.toString()
        connectedPeers.delete(id)
        updatePeerCount()
        if (connectedPeers.size === 0) {
          updateStatus('connecting', 'Reconnecting...')
        }
        addLog('- Disconnected: ' + id.substring(0, 16) + '...')
        // Don't add system message for disconnects — too spammy
      })

      // ── Messages ──
      node.services.pubsub.addEventListener('message', (evt) => {
        if (evt.detail.topic !== TOPIC) return
        try {
          const data = JSON.parse(new TextDecoder().decode(evt.detail.data))
          if (data.type !== 'chat' || !data.text) return
          if (data.peerId === myPeerId) return
          if (data.id && sentIds.has(data.id)) return
          data.route = 'gossipsub'
          addMessage(data, false)
        } catch {}
      })

      // Enable input
      $('msg-input').disabled = false
      $('send-btn').disabled = false
      $('msg-input').focus()

      // ── Keepalive ping ──
      setInterval(async () => {
        const conns = node.getConnections()
        for (const conn of conns) {
          try {
            await node.services.ping.ping(conn.remotePeer, { signal: AbortSignal.timeout(5000) })
          } catch {}
        }
      }, 15000)

      // ── Periodic presence ping (keeps GossipSub mesh alive) ──
      setInterval(async () => {
        try {
          const pingMsg = new TextEncoder().encode(JSON.stringify({
            type: 'ping', name: myName, peerId: myPeerId,
            level: 'Web', timestamp: Date.now()
          }))
          await node.services.pubsub.publish(TOPIC, pingMsg)
        } catch {}
      }, 5000)

      // ── Reconnect loop ──
      setInterval(async () => {
        if (connectedPeers.size < 1) {
          addLog('Low connections, retrying bootstrap...', 'info')
          for (const addr of bootstrapList) {
            try {
              await node.dial(multiaddr(addr), { signal: AbortSignal.timeout(10000) })
              addLog('Reconnected via bootstrap', 'success')
            } catch {}
          }
        }
      }, 30000)

      addSystem('✅ Connected to EatPan P2P network as ' + myName)

    } catch (err) {
      addLog('Failed to start: ' + err.message, 'error')
      addSystem('❌ Failed to connect: ' + err.message)
      updateStatus('', 'Error')
      connectBtn.disabled = false
    }
  }

  // ── Send message ──
  window.sendMessage = function() {
    const input = $('msg-input')
    const text = input.value.trim()
    if (!text || !node) return

    const id = myPeerId.substring(0, 8) + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4)
    sentIds.add(id)

    const msg = {
      type: 'chat',
      id,
      peerId: myPeerId,
      name: myName,
      text,
      level: 'Web',
      timestamp: Date.now()
    }

    const encoded = new TextEncoder().encode(JSON.stringify(msg))
    node.services.pubsub.publish(TOPIC, encoded).then(() => {
      addMessage({ name: myName, text, route: 'local' }, true)
      addLog('Sent message: ' + text.substring(0, 30))
    }).catch(err => {
      addLog('Send failed: ' + err.message, 'error')
    })

    input.value = ''
    input.focus()
  }

  // Enter key to send
  $('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.sendMessage()
  })
</script>

</body>
</html>
