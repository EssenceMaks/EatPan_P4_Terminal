server {
    server_name relay.eatpan.com;

    # WSS proxy: wss://relay.eatpan.com -> ws://localhost:9091
    location / {
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/relay.eatpan.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/relay.eatpan.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = relay.eatpan.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name relay.eatpan.com;
    return 404;
}
